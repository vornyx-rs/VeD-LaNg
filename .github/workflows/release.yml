name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vedc-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vedc-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: vedc-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vedc-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vedc dist/vedc
          cp -r examples dist/examples
          cp README.md LICENSE dist/
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\${{ matrix.target }}\release\vedc.exe dist\vedc.exe
          Copy-Item -Recurse examples dist\examples
          Copy-Item README.md, LICENSE dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (tar.gz)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (zip)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VED v${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: artifacts/*
          body: |
            ## VED ${{ github.ref_name }}

            A unified language that compiles to WebAssembly, native binary, and Axum server from one `.ved` source file.

            ### Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/vornyx-rs/VeD-LaNg/main/install.sh | bash
            ```

            **Windows:** download `vedc-windows-x86_64.zip` below, extract, add to PATH.

            **From source:**
            ```bash
            git clone https://github.com/vornyx-rs/VeD-LaNg
            cd VeD-LaNg
            cargo build --release
            # binary: target/release/vedc
            ```

            ### VS Code Extension

            Search **"VED Language"** in the VS Code Extensions panel (publisher: `vornyxrs`), or install the `.vsix` from the [vscode](https://github.com/vornyx-rs/VeD-LaNg/tree/main/vscode) directory.

            ### Quick Test

            ```bash
            vedc run examples/hello.ved
            vedc build examples/counter.ved --target web --out dist/counter
            vedc new my-app && vedc run my-app/src/Main.ved
            ```

            ### What Works in v1

            - Web target: compiles `.ved` to `app.wasm` + `index.html` + JS runtime
            - Server target: generates a compilable Axum Rust project
            - Native target: transpiles to Rust and compiles via `rustc`
            - Spring physics animations, reactive `remember` state, tap dispatch
            - `vedc new` project scaffolding (app / client / server / lib templates)

            ### Known Gaps (v1)

            - `each` loop variable not available inside canvas draw children
            - `parse_time` returns 0 (chrono pending)
            - LSP, formatter, and test runner are scaffolds only
            - MySQL removed (RUSTSEC-2023-0071, no upstream fix — v1.1)

            See [CHANGELOG.md](https://github.com/vornyx-rs/VeD-LaNg/blob/main/CHANGELOG.md) for full details.
