<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Counter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
#_verr{display:none;position:fixed;inset:0;z-index:9999;background:#111;color:#f66;padding:28px;font:13px/1.7 monospace;white-space:pre-wrap;overflow:auto}
</style>
</head>
<body>
<canvas id="v"></canvas>
<div id="_verr"></div>
<script type="module">
/* VED bootstrap — not user code, generated by vedc */
const canvas = document.getElementById('v');
const ctx    = canvas.getContext('2d');
const errDiv = document.getElementById('_verr');
const dec    = new TextDecoder();
let   inst   = null;
let   VW     = window.innerWidth;
let   VH     = window.innerHeight;

const mem  = () => new Uint8Array(inst.exports.memory.buffer);
const str_ = (p,l) => dec.decode(mem().subarray(p, p+l));

function showErr(e) {
  errDiv.style.display = 'block';
  errDiv.textContent   = 'VED boot error\n\n' + e;
}

/* Browser API ← WASM imports (canvas 2D + frame + input) */
const imports = { env: {
  ved_clear      : (r,g,b)           => { ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(0,0,VW,VH); },
  ved_set_fill   : (p,l)             => { ctx.fillStyle = str_(p,l); },
  ved_set_stroke : (p,l)             => { ctx.strokeStyle = str_(p,l); },
  ved_set_alpha  : (a)               => { ctx.globalAlpha = a; },
  ved_fill_rect  : (x,y,w,h)        => { ctx.fillRect(x,y,w,h); },
  ved_fill_rrect : (x,y,w,h,r)      => {
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,r);
    ctx.fill();
  },
  ved_stroke_rrect:(x,y,w,h,r,bw)   => {
    ctx.lineWidth=bw;
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,r);
    ctx.stroke();
  },
  ved_set_shadow : (bl,ox,oy,p,l)   => { ctx.shadowBlur=bl; ctx.shadowOffsetX=ox; ctx.shadowOffsetY=oy; ctx.shadowColor=str_(p,l); },
  ved_clear_shadow: ()               => { ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; ctx.shadowColor='transparent'; },
  ved_set_font   : (p,l)            => { ctx.font=str_(p,l); ctx.textBaseline='alphabetic'; },
  ved_fill_text  : (p,l,x,y)        => { ctx.fillText(str_(p,l),x,y); },
  ved_measure_text:(p,l)            => { return ctx.measureText(str_(p,l)).width; },
  ved_draw_image : (sp,sl,x,y,w,h) => {
    const src=str_(sp,sl);
    const img=new Image();
    img.onload=()=>{ ctx.drawImage(img,x,y,w,h); };
    img.src=src;
  },
  ved_push_transform: (cx,cy,sx,sy) => { ctx.save(); ctx.translate(cx,cy); ctx.scale(sx,sy); ctx.translate(-cx,-cy); },
  ved_pop_transform:  ()            => { ctx.restore(); },
  ved_request_frame: ()             => { requestAnimationFrame(frame); },
}
};

function frame() { inst.exports.ved_frame(); }

function sizeCanvas() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width  = Math.round(VW * devicePixelRatio);
  canvas.height = Math.round(VH * devicePixelRatio);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

async function boot() {
  /* Use arrayBuffer — works with any server MIME type for .wasm */
  const buf = await fetch('./app.wasm').then(r => r.arrayBuffer());
  const { instance } = await WebAssembly.instantiate(buf, imports);
  inst = instance;

  /* Size canvas, then init WASM state (ved_init triggers the first render) */
  sizeCanvas();
  inst.exports.ved_init(VW, VH);

  /* Wire events only after state is initialised */
  window.addEventListener('resize', () => {
    sizeCanvas();
    inst.exports.ved_resize(VW, VH);
  });

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    inst.exports.ved_tap(e.clientX - r.left, e.clientY - r.top);
  });

  canvas.addEventListener('pointermove', e => {
    if (inst.exports.ved_hover) {
      const r = canvas.getBoundingClientRect();
      inst.exports.ved_hover(e.clientX - r.left, e.clientY - r.top);
    }
  });

  canvas.addEventListener('pointerleave', () => {
    if (inst.exports.ved_hover) inst.exports.ved_hover(-1.0, -1.0);
  });
}

boot().catch(showErr);
</script>
</body>
</html>
