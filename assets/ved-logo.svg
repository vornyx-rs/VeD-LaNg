<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background: deep void -->
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="56%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0B0E22"/>
      <stop offset="100%" stop-color="#020509"/>
    </radialGradient>

    <!-- Three left-arm strand gradients (violet family) -->
    <linearGradient id="L1" x1="72"  y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5B2EFF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <linearGradient id="L2" x1="88"  y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7B52FF"/>
      <stop offset="100%" stop-color="#00DCFF"/>
    </linearGradient>
    <linearGradient id="L3" x1="104" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9D78FF"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>

    <!-- Three right-arm strand gradients (mint family) -->
    <linearGradient id="R1" x1="440" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00EEB0"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <linearGradient id="R2" x1="424" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D49A"/>
      <stop offset="100%" stop-color="#00DCFF"/>
    </linearGradient>
    <linearGradient id="R3" x1="408" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00BA86"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>

    <!-- Glow gradients for bloom layers -->
    <linearGradient id="bloomL" x1="72" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6B3FFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bloomR" x1="440" y1="76" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00EEB0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Wordmark gradient -->
    <linearGradient id="textGrad" x1="148" y1="460" x2="364" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7B52FF"/>
      <stop offset="50%"  stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#00EEB0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="160" y1="435" x2="352" y2="435" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5B2EFF" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#00C8FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00EEB0" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="farGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="36"/>
    </filter>
    <filter id="armGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tipGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="microGlow" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="icon">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#icon)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle grid -->
    <g stroke="#FFFFFF" stroke-opacity="0.018" stroke-width="1">
      <line x1="0" y1="64"  x2="512" y2="64"/><line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/><line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/><line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
      <line x1="64"  y1="0" x2="64"  y2="512"/><line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/><line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
    </g>

    <!-- === Far ambient bloom === -->
    <path d="M72,76 L256,392" fill="none" stroke="url(#bloomL)"
          stroke-width="80" stroke-linecap="butt" opacity="0.18" filter="url(#farGlow)"/>
    <path d="M440,76 L256,392" fill="none" stroke="url(#bloomR)"
          stroke-width="80" stroke-linecap="butt" opacity="0.18" filter="url(#farGlow)"/>

    <!-- === Mid bloom per strand group === -->
    <path d="M72,76 L256,392"  fill="none" stroke="url(#L1)" stroke-width="48" stroke-linecap="butt" opacity="0.20" filter="url(#farGlow)"/>
    <path d="M440,76 L256,392" fill="none" stroke="url(#R1)" stroke-width="48" stroke-linecap="butt" opacity="0.20" filter="url(#farGlow)"/>

    <!-- === Left arm — three strands (outer to inner) === -->
    <!-- Outer strand — violet, thickest, full glow -->
    <path d="M72,76 L256,392"  fill="none" stroke="url(#L1)" stroke-width="11" stroke-linecap="round" filter="url(#armGlow)"/>
    <!-- Mid strand — violet-blue -->
    <path d="M88,76 L256,392"  fill="none" stroke="url(#L2)" stroke-width="7"  stroke-linecap="round" opacity="0.80" filter="url(#armGlow)"/>
    <!-- Inner strand — lavender, thinnest -->
    <path d="M104,76 L256,392" fill="none" stroke="url(#L3)" stroke-width="4"  stroke-linecap="round" opacity="0.55"/>

    <!-- === Right arm — three strands (outer to inner) === -->
    <path d="M440,76 L256,392" fill="none" stroke="url(#R1)" stroke-width="11" stroke-linecap="round" filter="url(#armGlow)"/>
    <path d="M424,76 L256,392" fill="none" stroke="url(#R2)" stroke-width="7"  stroke-linecap="round" opacity="0.80" filter="url(#armGlow)"/>
    <path d="M408,76 L256,392" fill="none" stroke="url(#R3)" stroke-width="4"  stroke-linecap="round" opacity="0.55"/>

    <!-- === White laser cores === -->
    <path d="M72,76 L256,392"  fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
    <path d="M440,76 L256,392" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>

    <!-- === PCB-style branch traces on left arm === -->
    <!-- Branch at ~1/4 down left arm (approx 152, 172) -->
    <polyline points="152,172 132,172 132,148" fill="none" stroke="#6B47FF" stroke-width="1.5" stroke-opacity="0.50" stroke-linecap="square"/>
    <rect x="128" y="144" width="8" height="8" rx="1" fill="#6B47FF" opacity="0.70" filter="url(#microGlow)"/>
    <!-- Branch at ~1/2 down left arm (approx 184, 248) -->
    <polyline points="184,248 162,248" fill="none" stroke="#4488FF" stroke-width="1.5" stroke-opacity="0.40" stroke-linecap="square"/>
    <rect x="158" y="244" width="8" height="8" rx="1" fill="#4488FF" opacity="0.55"/>

    <!-- === PCB-style branch traces on right arm === -->
    <polyline points="360,172 380,172 380,148" fill="none" stroke="#00EEB0" stroke-width="1.5" stroke-opacity="0.50" stroke-linecap="square"/>
    <rect x="376" y="144" width="8" height="8" rx="1" fill="#00EEB0" opacity="0.70" filter="url(#microGlow)"/>
    <polyline points="328,248 350,248" fill="none" stroke="#00CCAA" stroke-width="1.5" stroke-opacity="0.40" stroke-linecap="square"/>
    <rect x="346" y="244" width="8" height="8" rx="1" fill="#00CCAA" opacity="0.55"/>

    <!-- === Convergence tip (256, 392) === -->
    <!-- Outer radial haze -->
    <circle cx="256" cy="392" r="52" fill="#00C8FF" opacity="0.08" filter="url(#farGlow)"/>
    <!-- Inner bloom -->
    <circle cx="256" cy="392" r="24" fill="#00DCFF" opacity="0.30" filter="url(#tipGlow)"/>
    <!-- Pad ring -->
    <circle cx="256" cy="392" r="9"  fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.70"/>
    <!-- Core dot -->
    <circle cx="256" cy="392" r="4"  fill="white" opacity="0.95"/>

    <!-- === Terminal pads (top corners) === -->
    <!-- Left terminal — violet square pad -->
    <rect x="62" y="66" width="20" height="20" rx="3" fill="#5B2EFF" opacity="0.22" filter="url(#dotGlow)"/>
    <rect x="64" y="68" width="16" height="16" rx="2" fill="#5B2EFF" opacity="0.80"/>
    <circle cx="72" cy="76" r="3.5" fill="white" opacity="0.80"/>
    <!-- Right terminal — mint square pad -->
    <rect x="430" y="66" width="20" height="20" rx="3" fill="#00EEB0" opacity="0.22" filter="url(#dotGlow)"/>
    <rect x="432" y="68" width="16" height="16" rx="2" fill="#00EEB0" opacity="0.80"/>
    <circle cx="440" cy="76" r="3.5" fill="white" opacity="0.80"/>

    <!-- === Top horizontal registration marks === -->
    <line x1="62"  y1="52" x2="168" y2="52" stroke="#5B2EFF" stroke-width="1.5" stroke-opacity="0.40"/>
    <line x1="344" y1="52" x2="450" y2="52" stroke="#00EEB0" stroke-width="1.5" stroke-opacity="0.40"/>
    <line x1="62"  y1="48" x2="62"  y2="56" stroke="#5B2EFF" stroke-width="1.5" stroke-opacity="0.50"/>
    <line x1="450" y1="48" x2="450" y2="56" stroke="#00EEB0" stroke-width="1.5" stroke-opacity="0.50"/>

    <!-- === Constellation micro-nodes === -->
    <!-- Left arm midpoints -->
    <circle cx="130" cy="218" r="2.0" fill="#7B6BFF" opacity="0.60" filter="url(#microGlow)"/>
    <circle cx="164" cy="290" r="1.4" fill="#00C8FF" opacity="0.45"/>
    <circle cx="118" cy="168" r="1.2" fill="white"   opacity="0.25"/>
    <!-- Right arm midpoints -->
    <circle cx="382" cy="218" r="2.0" fill="#00EEB0"  opacity="0.60" filter="url(#microGlow)"/>
    <circle cx="348" cy="290" r="1.4" fill="#00C8FF"  opacity="0.45"/>
    <circle cx="394" cy="168" r="1.2" fill="white"    opacity="0.25"/>
    <!-- Center axis hint -->
    <circle cx="256" cy="164" r="1.5" fill="#00C8FF" opacity="0.35"/>
    <circle cx="256" cy="230" r="1.0" fill="#00C8FF" opacity="0.25"/>

    <!-- === Wordmark === -->
    <line x1="160" y1="435" x2="352" y2="435" stroke="url(#lineGrad)" stroke-width="1"/>
    <text
      x="256" y="474"
      font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="48"
      font-weight="800"
      letter-spacing="14"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="url(#textGrad)"
    >ved</text>

  </g>

  <!-- Border ring outside clip -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="96"
        fill="none" stroke="url(#textGrad)" stroke-opacity="0.18" stroke-width="3"/>
</svg>
